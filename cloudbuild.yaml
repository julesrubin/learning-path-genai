substitutions:
  _SERVICES_TO_BUILD: 'genai-api'
  _REGION: 'europe-west1'

steps:
  # Project initialization - creates tfstate bucket if needed
  - id: 'project-init'
    name: gcr.io/cloud-builders/gcloud
    entrypoint: sh
    args:
      - '-c'
      - |
        echo "***********************"
        echo "project           : $PROJECT_ID"
        echo "branch            : $BRANCH_NAME"
        echo "***********************"
        cd iac/init
        chmod +x init.sh
        ./init.sh ${PROJECT_ID} ${BRANCH_NAME}

  # Terraform init
  - id: 'terraform-init'
    name: 'hashicorp/terraform:1.14.1'
    entrypoint: 'sh'
    env:
      - 'TF_VAR_branch_name=${BRANCH_NAME}'
    args:
      - '-c'
      - |
        cd iac
        terraform init -input=false -no-color -upgrade -backend-config=init/backend.tfvars

  # Terraform plan
  - id: 'terraform-plan'
    name: 'hashicorp/terraform:1.14.1'
    entrypoint: 'sh'
    env:
      - 'TF_VAR_branch_name=${BRANCH_NAME}'
    args:
      - '-c'
      - |
        cd iac
        terraform plan -out=changes.tfplan -var project_id=$PROJECT_ID

  # Terraform apply (Stage 1) - Create infrastructure (Artifact Registry + Service Account)
  - id: 'terraform-apply-infrastructure'
    name: 'hashicorp/terraform:1.14.1'
    entrypoint: 'sh'
    env:
      - 'TF_VAR_branch_name=${BRANCH_NAME}'
    args:
      - '-c'
      - |
        cd iac
        echo "Applying infrastructure resources (Artifact Registry, Service Account)..."
        terraform apply -input=false -no-color -auto-approve \
          -var project_id=$PROJECT_ID \
          -target=google_artifact_registry_repository.learning_path_genai \
          -target=google_service_account.cloud_run

  # Build and push Docker images for Cloud Run services
  - id: 'docker-build-push'
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ -z "${_SERVICES_TO_BUILD}" ]; then
          echo "No services to build (_SERVICES_TO_BUILD is empty). Skipping..."
          exit 0
        fi

        # Sanitize branch name: replace _ with - for GCP compatibility
        SANITIZED_BRANCH=$$(echo "${BRANCH_NAME}" | tr '_' '-')
        REPO="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${PROJECT_ID}-gcr-learning-path-genai-$${SANITIZED_BRANCH}"

        for SERVICE in ${_SERVICES_TO_BUILD}; do
          echo "========================================"
          echo "Building and pushing: $${SERVICE}"
          echo "========================================"
          DOCKER_BUILDKIT=1 docker build -t "$${REPO}/$${SERVICE}:latest" -t "$${REPO}/$${SERVICE}:${SHORT_SHA}" "cloud_run/$${SERVICE}"
          docker push "$${REPO}/$${SERVICE}" --all-tags
        done

  # Terraform apply (Stage 2) - Create Cloud Run services (now that images exist)
  - id: 'terraform-apply-services'
    name: 'hashicorp/terraform:1.14.1'
    entrypoint: 'sh'
    env:
      - 'TF_VAR_branch_name=${BRANCH_NAME}'
    args:
      - '-c'
      - |
        cd iac
        echo "Applying Cloud Run services..."
        terraform apply -input=false -no-color -auto-approve -var project_id=$PROJECT_ID

timeout: 5400s
options:
  logging: CLOUD_LOGGING_ONLY
serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/build-learning-path-sa@$PROJECT_ID.iam.gserviceaccount.com'
